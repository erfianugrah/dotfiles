# Starship Configuration - P10k Pure Theme (Single Line)
# Loaded via STARSHIP_CONFIG=$HOME/starship.toml in .zshrc

# Global prompt configuration
add_newline = false
command_timeout = 1000
scan_timeout = 30

# Single-line format - left side essentials, right side contextual info
format = """$directory$git_branch$git_status$git_state$character"""
right_format = """$cmd_duration$python$all"""

# Disable line break for single-line prompt
[line_break]
disabled = true

# Directory configuration (Pure theme uses blue, minimal truncation)
[directory]
style = "blue"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0

# Git branch styling (Pure uses lighter grey)
[git_branch]
format = "[$branch]($style) "
style = "242"  # Lighter grey that's more visible
truncation_length = 9999  # Effectively no truncation
only_attached = false

# Git status with Pure theme symbols and colors
[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "cyan"
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "≡${count} "
modified = "*${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "
ignore_submodules = false

# Git state for rebase/merge operations (Pure uses bright-black)
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# Pure theme prompt character (❯ in magenta/red, ❮ for vi command mode)
[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"
format = "$symbol "

# Command duration (Pure shows in yellow when > 5 seconds)
[cmd_duration]
min_time = 5000
format = "[$duration]($style) "
style = "yellow"

# Python virtual environment (Pure uses bright-black)
[python]
format = '[${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bright-black"
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "__init__.py", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]

# Username and hostname (only show when in SSH or as root)
[username]
style_user = "bright-black"
style_root = "red bold"
format = "[$user]($style)"
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bright-black"

# Additional modules for right prompt (matching Pure behavior)
[status]
disabled = false
format = '[\[$status\]]($style) '
style = "red"

[time]
disabled = true

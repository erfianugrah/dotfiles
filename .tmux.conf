# set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-features ",xterm-256color:RGB"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Themes
# set -g @plugin 'catppuccin/tmux'
set -g @plugin "janoamaral/tokyo-night-tmux"
# set -g @tokyo-night-tmux_show_netspeed 1
# set -g @tokyo-night-tmux_netspeed_iface "eth0"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set mouse and term colors
set -g mouse on
set -g default-terminal 'tmux-256color'
set -g prefix ^a
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'
set -g set-clipboard on

# Split windows
bind '-' split-window -h
bind '=' split-window -v

# Secrets are now served via bw serve (localhost:8087) — no need to propagate
# env vars through tmux. Any shell can query the local API independently.
set -g allow-passthrough all
# Forward wezterm's env into every pane (tmux otherwise strips WEZTERM_*), so
# `wezterm imgcat` and other graphics tools work inside tmux panes.
set -ga update-environment "WEZTERM_PANE WEZTERM_EXECUTABLE WEZTERM_CONFIG_DIR WEZTERM_UNIX_SOCKET"

# pi.dev
set -g extended-keys on
set -g extended-keys-format csi-u

# macOS only: tokyo-night-tmux's themes.sh uses `declare -A` (bash >= 4.2), but
# macOS /bin/bash is 3.2 and errors out -> yellow/orange status bar. Put Homebrew
# first on the tmux server PATH so `env bash` resolves to the brew bash (run
# `brew install bash`). No-op on Linux. Must precede the TPM run line below.
# Interactive shells re-derive their own PATH on startup, so this only steers
# tmux's own #()/run-shell subprocesses.
if-shell '[ -x /opt/homebrew/bin/bash ]' \
  'set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"'
if-shell '[ ! -d /opt/homebrew/bin ] && [ -x /usr/local/bin/bash ]' \
  'set-environment -g PATH "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"'

# Run TPM
run '~/.tmux/plugins/tpm/tpm'

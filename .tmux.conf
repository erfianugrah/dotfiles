# set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-features ",xterm-256color:RGB"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Themes
# set -g @plugin 'catppuccin/tmux'
set -g @plugin "janoamaral/tokyo-night-tmux"
# set -g @tokyo-night-tmux_show_netspeed 1
# set -g @tokyo-night-tmux_netspeed_iface "eth0"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set mouse and term colors
set -g mouse on
set -g default-terminal 'tmux-256color'
set -g prefix ^a
# Clipboard handled by tmux-yank plugin (auto-detects pbcopy/xclip/clip.exe)
set -g set-clipboard on

# Split windows
bind '-' split-window -h
bind '=' split-window -v

# Secrets are now served via bw serve (localhost:8087) — no need to propagate
# env vars through tmux. Any shell can query the local API independently.
set -g allow-passthrough all

# Run TPM
run '~/.tmux/plugins/tpm/tpm'
